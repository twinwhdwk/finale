[paths]
# PDF 악보 파일들이 있는 폴더 경로
pdf_dir = C:\Users\강우현\Desktop\Finale_Ref\pdfs

# 피날레에서 Export한 XML 파일들이 있는 폴더 경로
xml_dir = C:\Users\강우현\Desktop\Finale_Ref\xmls

# 직접 그린 피날레의 musx 파일들이 있는 경로
