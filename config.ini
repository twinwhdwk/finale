[paths]
# PDF 악보 파일들이 있는 폴더 경로
pdf_dir = C:\Users\강우현\Desktop\Finale_Ref\pdfs

# 피날레에서 Export한 XML 파일들이 있는 폴더 경로
xml_dir = C:\Users\강우현\Desktop\Finale_Ref\xmls

# 직접 그린 피날레의 musx 파일들이 있는 경로
musx = C:\Users\강우현\Desktop\Finale_Ref\musx

# PDF → XML 변환 결과가 저장될 폴더
converted_xml_dir = C:\Users\강우현\Desktop\Finale_Ref\xmls_converted

# 검수 리포트(HTML)가 저장될 폴더
report_dir = C:\Users\강우현\Desktop\Finale\reports

[audiveris]
# Audiveris 실행 파일 경로 (변경 필요시 수정)
path = C:\Program Files\Audiveris\Audiveris.exe

[musescore]
# MuseScore 실행 파일 경로 (변경 필요시 수정)
path = C:\Program Files\MuseScore 4\bin\MuseScore4.exe
dpi  = 300

[homr]
# homr는 별도 설치 필요: pip install homr && homr --init
# PATH에 homr가 잡혀 있지 않으면 절대경로 지정 (선택, 비워두면 PATH에서 탐색)
path =
# PDF → 페이지 PNG 변환 해상도 (Audiveris의 600dpi보다 낮아도 무방)
dpi = 300
# auto: GPU 있으면 자동 사용 / force: GPU 강제 / off: CPU만 사용
gpu = auto

[opencv]
# 자체 OpenCV 파이프라인 파라미터 (실제 교과서 PDF 실측 후 조정 권장)
# 합성 이미지 기준값 - 실제 PDF에서 half 오분류 시 0.43~0.45로 낮춤
head_fill_threshold = 0.50
# 음표머리 반지름/오선간격 비율 (실측: staff_gap=20 -> radius=11 -> 0.55)
notehead_radius_ratio = 0.55
# 기둥 판정 높이 배율 (여유 30px라 보통 조정 불필요)
has_stem_height_ratio = 2.5
# 조표 (샵 개수: 1=G장조, 2=D장조, ... / 플랫 개수: -1=F장조, -2=Bb장조, ... / 0=C장조)
# 자동 감지 미구현 - 악보를 보고 직접 입력
key_sig = 0
# 박자표 (자동 감지 미구현 - 악보를 보고 직접 입력)
time_sig = 4/4
# 음자리표: treble(높은음자리표) 또는 bass(낮은음자리표)
# 교과서 악보 대부분은 treble 단일 또는 treble+bass 이성부
clef_type = treble

[options]
# 비교할 파트 인덱스 (0 = 첫 번째 악기/파트)
part_index = 0
